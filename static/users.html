<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轉蛋機器人 - 玩家管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1b2e; color: #e0e0e0; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 24px 32px; }
  .header h1 { font-size: 24px; color: #fff; }
  .header p { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 4px; }
  .header a { color: #fff; text-decoration: underline; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .card { background: #242640; border-radius: 12px; padding: 20px; border: 1px solid #333560; margin-bottom: 20px; }
  .card h2 { font-size: 16px; color: #a0a0ff; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 10px 12px; text-align: left; border-bottom: 1px solid #333560; }
  th { color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; position: sticky; top: 0; background: #242640; }
  tr:hover { background: #2a2c4a; }
  .btn { padding: 6px 14px; border-radius: 6px; border: none; cursor: pointer; font-size: 12px; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: #667eea; color: #fff; }
  .btn-primary:hover { background: #5a6fd6; }
  .btn-success { background: #2ecc71; color: #fff; }
  .btn-success:hover { background: #27ae60; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #2ecc71; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .toast.error { background: #e74c3c; }
  .search-bar { display: flex; gap: 12px; margin-bottom: 16px; align-items: center; }
  .search-bar input { flex: 1; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #1a1b2e; color: #e0e0e0; font-size: 14px; }
  .search-bar input:focus { outline: none; border-color: #667eea; }
  .edit-input { width: 80px; padding: 4px 8px; border-radius: 4px; border: 1px solid #444; background: #1a1b2e; color: #e0e0e0; font-size: 13px; text-align: right; }
  .edit-input:focus { outline: none; border-color: #667eea; }
  .stats { display: flex; gap: 20px; margin-bottom: 16px; }
  .stat { background: #1a1b2e; border-radius: 8px; padding: 12px 16px; border: 1px solid #333560; }
  .stat .label { font-size: 11px; color: #888; }
  .stat .value { font-size: 20px; font-weight: 600; color: #a0a0ff; }
  .activity-badge { display: inline-block; background: #f39c12; color: #000; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; margin-left: 8px; }
</style>
</head>
<body>

<div class="header">
  <h1>👥 玩家管理</h1>
  <p style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">
    <select id="guild-select" onchange="switchGuild()" style="padding:4px 10px;border-radius:6px;border:1px solid rgba(255,255,255,0.3);background:rgba(0,0,0,0.2);color:#fff;font-size:13px;min-width:180px"></select>
    <a href="/">← 返回設定頁</a>
  </p>
</div>

<div class="container">
  <div class="stats" id="stats-bar">
    <div class="stat"><div class="label">總玩家數</div><div class="value" id="stat-total">0</div></div>
    <div class="stat"><div class="label">活動模式</div><div class="value" id="stat-activity">關閉</div></div>
  </div>

  <div class="card">
    <div class="search-bar">
      <input type="text" id="search" placeholder="搜尋 User ID..." oninput="filterUsers()" />
      <button class="btn btn-primary" onclick="loadUsers()">重新整理</button>
    </div>
    <div style="max-height:600px;overflow-y:auto">
      <table>
        <thead>
          <tr>
            <th>User ID</th>
            <th>⚡ 精力</th>
            <th>🪙 代幣</th>
            <th id="event-col" style="display:none">🎪 限時代幣</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="users-table"></tbody>
      </table>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
let allUsers = [];
let activityActive = false;
let currentGuild = '';

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2000);
}

async function api(method, path, body) {
  let url = path;
  if (path.startsWith('/api/') && path !== '/api/guilds' && currentGuild) {
    const sep = url.includes('?') ? '&' : '?';
    url += sep + 'guild=' + currentGuild;
  }
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(url, opts);
  if (!res.ok) throw new Error('API error');
  return res.json();
}

async function loadGuilds() {
  const guilds = await api('GET', '/api/guilds');
  const sel = document.getElementById('guild-select');
  if (!guilds.length) {
    sel.innerHTML = '<option value="">-- 尚無伺服器 --</option>';
    currentGuild = '';
    return;
  }
  sel.innerHTML = guilds.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
  const saved = localStorage.getItem('selectedGuild');
  if (saved && guilds.some(g => g.id === saved)) {
    sel.value = saved;
  }
  currentGuild = sel.value;
}

function switchGuild() {
  currentGuild = document.getElementById('guild-select').value;
  localStorage.setItem('selectedGuild', currentGuild);
  if (currentGuild) loadUsers();
}

async function loadUsers() {
  if (!currentGuild) return;
  const [users, activity] = await Promise.all([
    api('GET', '/api/users'),
    api('GET', '/api/activity'),
  ]);
  allUsers = users;
  activityActive = activity.active;

  document.getElementById('stat-total').textContent = users.length;
  document.getElementById('stat-activity').innerHTML = activity.active
    ? `<span class="activity-badge">${activity.name || '進行中'}</span>`
    : '關閉';

  const eventCol = document.getElementById('event-col');
  eventCol.style.display = activityActive ? '' : 'none';

  renderUsers(users);
}

function renderUsers(users) {
  const tb = document.getElementById('users-table');
  tb.innerHTML = users.map(u => `<tr data-uid="${u.user_id}">
    <td><code>${u.user_id}</code></td>
    <td><input class="edit-input" type="number" value="${u.energy}" data-field="energy" data-uid="${u.user_id}" /></td>
    <td><input class="edit-input" type="number" value="${u.tokens}" data-field="tokens" data-uid="${u.user_id}" /></td>
    ${activityActive ? `<td><input class="edit-input" type="number" value="${u.event_tokens || 0}" data-field="event_tokens" data-uid="${u.user_id}" /></td>` : ''}
    <td><button class="btn btn-success" onclick="saveUser('${u.user_id}')">儲存</button></td>
  </tr>`).join('');
}

function filterUsers() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = q ? allUsers.filter(u => u.user_id.includes(q)) : allUsers;
  renderUsers(filtered);
}

async function saveUser(uid) {
  const row = document.querySelector(`tr[data-uid="${uid}"]`);
  const inputs = row.querySelectorAll('.edit-input');
  const data = { user_id: uid };
  inputs.forEach(input => {
    data[input.dataset.field] = input.value;
  });
  await api('POST', '/api/users', data);
  toast('玩家數值已更新');
}

loadGuilds().then(() => { if (currentGuild) loadUsers(); });
</script>
</body>
</html>
