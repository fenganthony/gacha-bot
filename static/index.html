<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>轉蛋機器人 - 後台管理</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1b2e; color: #e0e0e0; min-height: 100vh; }
  .header { background: linear-gradient(135deg, #667eea, #764ba2); padding: 24px 32px; }
  .header h1 { font-size: 24px; color: #fff; }
  .header p { color: rgba(255,255,255,0.7); font-size: 14px; margin-top: 4px; }
  .container { max-width: 960px; margin: 0 auto; padding: 24px 16px; }
  .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
  @media (max-width: 640px) { .grid { grid-template-columns: 1fr; } }
  .card { background: #242640; border-radius: 12px; padding: 20px; border: 1px solid #333560; }
  .card h2 { font-size: 16px; color: #a0a0ff; margin-bottom: 16px; display: flex; align-items: center; gap: 8px; }
  .field { margin-bottom: 12px; }
  .field label { display: block; font-size: 12px; color: #888; margin-bottom: 4px; }
  .field input, .field select { width: 100%; padding: 8px 12px; border-radius: 6px; border: 1px solid #444; background: #1a1b2e; color: #e0e0e0; font-size: 14px; }
  .field input:focus, .field select:focus { outline: none; border-color: #667eea; }
  .btn { padding: 8px 16px; border-radius: 6px; border: none; cursor: pointer; font-size: 13px; font-weight: 500; transition: all 0.2s; }
  .btn-primary { background: #667eea; color: #fff; }
  .btn-primary:hover { background: #5a6fd6; }
  .btn-danger { background: #e74c3c; color: #fff; }
  .btn-danger:hover { background: #c0392b; }
  .btn-sm { padding: 4px 10px; font-size: 12px; }
  .btn-row { display: flex; gap: 8px; margin-top: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th, td { padding: 8px 12px; text-align: left; border-bottom: 1px solid #333560; }
  th { color: #888; font-weight: 500; font-size: 11px; text-transform: uppercase; }
  .badge { display: inline-block; padding: 2px 8px; border-radius: 4px; font-size: 11px; font-weight: 600; }
  .badge-n { background: #95a5a6; color: #fff; }
  .badge-r { background: #3498db; color: #fff; }
  .badge-sr { background: #9b59b6; color: #fff; }
  .badge-ssr { background: #f1c40f; color: #000; }
  .badge-secret { background: #e74c3c; color: #fff; }
  .toast { position: fixed; bottom: 24px; right: 24px; background: #2ecc71; color: #fff; padding: 12px 20px; border-radius: 8px; font-size: 14px; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 999; }
  .toast.show { opacity: 1; }
  .toast.error { background: #e74c3c; }
  .inline-fields { display: flex; gap: 8px; }
  .inline-fields .field { flex: 1; }
  .full-width { grid-column: 1 / -1; }
  .rarity-grid { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; gap: 8px; }
  .preset-bar { background: #1e1f36; border: 1px solid #333560; border-radius: 12px; padding: 16px 20px; margin-bottom: 20px; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
  .preset-bar h2 { font-size: 14px; color: #a0a0ff; margin: 0; white-space: nowrap; }
  .preset-bar select { padding: 6px 10px; border-radius: 6px; border: 1px solid #444; background: #1a1b2e; color: #e0e0e0; font-size: 13px; min-width: 160px; }
  .preset-bar input { padding: 6px 10px; border-radius: 6px; border: 1px solid #444; background: #1a1b2e; color: #e0e0e0; font-size: 13px; width: 140px; }
  .btn-success { background: #2ecc71; color: #fff; }
  .btn-success:hover { background: #27ae60; }
  .btn-warning { background: #f39c12; color: #fff; }
  .btn-warning:hover { background: #e67e22; }
  .preset-time { font-size: 11px; color: #666; margin-left: 4px; }
</style>
</head>
<body>

<div class="header">
  <h1>🎰 轉蛋機器人 後台管理</h1>
  <p>即時調整遊戲設定，變更會立即生效 ｜ <a href="/users" style="color:#fff;text-decoration:underline">👥 玩家管理</a></p>
</div>

<div class="container">
  <!-- Presets -->
  <div class="preset-bar">
    <h2>💾 設定組合</h2>
    <select id="preset-select"><option value="">-- 選擇組合 --</option></select>
    <button class="btn btn-warning btn-sm" onclick="loadPreset()">載入</button>
    <button class="btn btn-danger btn-sm" onclick="deletePreset()">刪除</button>
    <span style="color:#555">|</span>
    <input type="text" id="preset-name" placeholder="輸入新組合名稱..." />
    <button class="btn btn-success btn-sm" onclick="savePreset()">儲存目前設定</button>
  </div>

  <!-- Activity Mode -->
  <div class="card" style="margin-bottom:20px; border-color:#f39c12" id="activity-card">
    <h2>🎪 活動模式</h2>
    <div id="activity-status"></div>
    <div id="activity-controls">
      <div class="inline-fields">
        <div class="field"><label>活動名稱</label><input type="text" id="activity_name" placeholder="例：春節活動" /></div>
        <div class="field"><label>每人初始限時代幣</label><input type="number" id="activity_initial" value="0" /></div>
      </div>
      <div class="btn-row">
        <button class="btn btn-warning" id="activity-toggle" onclick="toggleActivity()">啟動活動</button>
      </div>
    </div>
  </div>

  <!-- Energy & Tokens -->
  <div class="grid">
    <div class="card">
      <h2>⚡ 精力設定</h2>
      <div class="field">
        <label>每日獲得精力</label>
        <input type="number" id="daily_energy" />
      </div>
      <div class="field">
        <label>精力上限</label>
        <input type="number" id="max_energy" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveEnergy()">儲存</button>
      </div>
    </div>

    <div class="card">
      <h2>🪙 代幣設定</h2>
      <div class="field">
        <label>扭蛋所需代幣</label>
        <input type="number" id="gacha_cost" />
      </div>
      <div class="field">
        <label>簽到獎勵代幣</label>
        <input type="number" id="checkin_reward" />
      </div>
      <div class="field">
        <label>簽到冷卻（小時）</label>
        <input type="number" id="checkin_reset" />
      </div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="saveTokens()">儲存</button>
      </div>
    </div>
  </div>

  <!-- Rarity Weights -->
  <div class="card" style="margin-bottom:20px">
    <h2>🎯 稀有度權重（N / R / SR / SSR）</h2>
    <div class="rarity-grid">
      <div class="field"><label>N</label><input type="number" id="weight_n" /></div>
      <div class="field"><label>R</label><input type="number" id="weight_r" /></div>
      <div class="field"><label>SR</label><input type="number" id="weight_sr" /></div>
      <div class="field"><label>SSR</label><input type="number" id="weight_ssr" /></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveRarity()">儲存</button>
    </div>
  </div>

  <!-- Redeem Settings -->
  <div class="card" style="margin-bottom:20px">
    <h2>🎁 兌換設定</h2>
    <div class="field">
      <label>公告頻道 ID（留空 = 使用者所在頻道）</label>
      <input type="text" id="redeem_channel" placeholder="例：1234567890" />
    </div>
    <div class="field">
      <label>標記身分組 ID（留空 = 不標記）</label>
      <input type="text" id="redeem_role" placeholder="例：1234567890" />
    </div>
    <div class="field">
      <label>公告訊息模板（可用 {user} {item} {rarity} {role}）</label>
      <input type="text" id="redeem_template" />
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="saveRedeem()">儲存</button>
    </div>
  </div>

  <!-- Work -->
  <div class="card" style="margin-bottom:20px">
    <h2>💼 打工地點</h2>
    <table>
      <thead><tr><th>名稱</th><th>工時</th><th>消耗精力</th><th>獲得代幣</th><th></th></tr></thead>
      <tbody id="work-table"></tbody>
    </table>
    <h3 style="font-size:13px;color:#888;margin:16px 0 8px">新增打工地點</h3>
    <div class="inline-fields">
      <div class="field"><label>名稱</label><input type="text" id="new_work_name" /></div>
      <div class="field"><label>工時(h)</label><input type="number" id="new_work_hours" /></div>
      <div class="field"><label>精力</label><input type="number" id="new_work_energy" /></div>
      <div class="field"><label>代幣</label><input type="number" id="new_work_reward" /></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addWork()">新增</button>
    </div>
  </div>

  <!-- Gacha Pool -->
  <div class="card">
    <h2>🎰 獎品池</h2>
    <table>
      <thead><tr><th>稀有度</th><th>名稱</th><th>機率</th><th></th></tr></thead>
      <tbody id="prize-table"></tbody>
    </table>
    <h3 style="font-size:13px;color:#888;margin:16px 0 8px">新增獎品</h3>
    <div class="inline-fields">
      <div class="field"><label>名稱</label><input type="text" id="new_prize_name" /></div>
      <div class="field">
        <label>稀有度</label>
        <select id="new_prize_rarity" onchange="toggleWeight()">
          <option value="N">N</option>
          <option value="R">R</option>
          <option value="SR">SR</option>
          <option value="SSR">SSR</option>
          <option value="秘藏">秘藏</option>
        </select>
      </div>
      <div class="field" id="weight-field" style="display:none">
        <label>權重</label>
        <input type="number" id="new_prize_weight" value="1" />
      </div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addPrize()">新增</button>
    </div>
  </div>

  <!-- Adventures -->
  <div class="card" style="margin-top:20px">
    <h2>⚔️ 冒險事件</h2>
    <table>
      <thead><tr><th>名稱</th><th>消耗</th><th>成功率</th><th>成功獎勵</th><th>失敗獎勵</th><th></th></tr></thead>
      <tbody id="adventure-table"></tbody>
    </table>
    <h3 style="font-size:13px;color:#888;margin:16px 0 8px">新增冒險</h3>
    <div class="inline-fields">
      <div class="field"><label>名稱</label><input type="text" id="new_adv_name" /></div>
      <div class="field">
        <label>消耗類型</label>
        <select id="new_adv_cost_type" onchange="toggleBetFields()">
          <option value="energy">精力</option>
          <option value="tokens">代幣（固定）</option>
          <option value="custom_tokens">代幣（自選）</option>
        </select>
      </div>
      <div class="field" id="adv-cost-field"><label>消耗數量</label><input type="number" id="new_adv_cost" /></div>
      <div class="field"><label>成功率(%)</label><input type="number" id="new_adv_rate" min="0" max="100" /></div>
    </div>
    <div class="inline-fields" id="bet-range-fields" style="display:none;margin-top:8px">
      <div class="field"><label>最小投入</label><input type="number" id="new_adv_min_bet" value="1" /></div>
      <div class="field"><label>最大投入</label><input type="number" id="new_adv_max_bet" value="9999" /></div>
    </div>
    <div class="inline-fields" style="margin-top:8px">
      <div class="field">
        <label>成功獎勵類型</label>
        <select id="new_adv_sr_type">
          <option value="fixed">固定代幣</option>
          <option value="multiplier">投入倍率</option>
        </select>
      </div>
      <div class="field"><label>成功數值</label><input type="number" id="new_adv_sr_val" step="0.1" /></div>
      <div class="field">
        <label>失敗獎勵類型</label>
        <select id="new_adv_fr_type">
          <option value="fixed">固定代幣</option>
          <option value="multiplier">投入倍率</option>
        </select>
      </div>
      <div class="field"><label>失敗數值</label><input type="number" id="new_adv_fr_val" step="0.1" /></div>
    </div>
    <div class="btn-row">
      <button class="btn btn-primary" onclick="addAdventure()">新增</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = '';

function toast(msg, isError) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show' + (isError ? ' error' : '');
  setTimeout(() => el.className = 'toast', 2000);
}

async function api(method, path, body) {
  const opts = { method, headers: { 'Content-Type': 'application/json' } };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API + path, opts);
  if (!res.ok) throw new Error('API error');
  return res.json();
}

function badgeClass(r) {
  return { N: 'badge-n', R: 'badge-r', SR: 'badge-sr', SSR: 'badge-ssr', '秘藏': 'badge-secret' }[r] || '';
}

async function loadConfig() {
  const c = await api('GET', '/api/config');
  document.getElementById('daily_energy').value = c.energy.daily_amount;
  document.getElementById('max_energy').value = c.energy.max_amount;
  document.getElementById('gacha_cost').value = c.tokens.gacha_cost;
  document.getElementById('checkin_reward').value = c.tokens.checkin_reward;
  document.getElementById('checkin_reset').value = c.tokens.checkin_reset_hours;
  document.getElementById('weight_n').value = c.rarity_weights.N;
  document.getElementById('weight_r').value = c.rarity_weights.R;
  document.getElementById('weight_sr').value = c.rarity_weights.SR;
  document.getElementById('weight_ssr').value = c.rarity_weights.SSR;

  // Redeem
  const rd = c.redeem || {};
  document.getElementById('redeem_channel').value = rd.channel_id || '';
  document.getElementById('redeem_role').value = rd.role_id || '';
  document.getElementById('redeem_template').value = rd.message_template || '';

  const wt = document.getElementById('work-table');
  wt.innerHTML = c.work.map(w => `<tr>
    <td>${w.name}</td><td>${w.duration_hours}h</td><td>${w.energy_cost}</td><td>${w.token_reward}</td>
    <td><button class="btn btn-danger btn-sm" onclick="deleteWork('${w.name}')">刪除</button></td>
  </tr>`).join('');

  const pt = document.getElementById('prize-table');
  pt.innerHTML = c.gacha_pool.map(p => {
    const pct = p.probability * 100;
    const pctStr = pct >= 1 ? pct.toFixed(1) + '%' : pct.toFixed(2) + '%';
    const extra = p.rarity === '秘藏' ? ` (w:${p.weight})` : '';
    return `<tr>
      <td><span class="badge ${badgeClass(p.rarity)}">${p.rarity}</span></td>
      <td>${p.name}${extra}</td><td>${pctStr}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deletePrize('${p.name}')">刪除</button></td>
    </tr>`;
  }).join('');

  // Adventures
  const at = document.getElementById('adventure-table');
  at.innerHTML = (c.adventures || []).map(a => {
    const rate = Math.round(a.success_rate * 100);
    const sr = a.success_reward;
    const fr = a.failure_reward;
    const srStr = sr.type === 'fixed' ? `🪙 +${sr.amount || 0}` : `🪙 ×${sr.value}`;
    const frStr = fr.type === 'fixed' ? `🪙 +${fr.amount || 0}` : `🪙 ×${fr.value}`;
    let costStr;
    if (a.cost_type === 'custom_tokens') {
      costStr = `🪙 自選 ${a.min_bet||1}~${a.max_bet||9999}`;
    } else {
      costStr = (a.cost_type === 'energy' ? '⚡' : '🪙') + ' ' + a.cost_amount;
    }
    return `<tr>
      <td>${a.name}</td><td>${costStr}</td><td>${rate}%</td>
      <td>${srStr}</td><td>${frStr}</td>
      <td><button class="btn btn-danger btn-sm" onclick="deleteAdventure('${a.name}')">刪除</button></td>
    </tr>`;
  }).join('');
}

async function saveEnergy() {
  await api('POST', '/api/energy', {
    daily_amount: document.getElementById('daily_energy').value,
    max_amount: document.getElementById('max_energy').value,
  });
  toast('精力設定已儲存');
}

async function saveTokens() {
  await api('POST', '/api/tokens', {
    gacha_cost: document.getElementById('gacha_cost').value,
    checkin_reward: document.getElementById('checkin_reward').value,
    checkin_reset_hours: document.getElementById('checkin_reset').value,
  });
  toast('代幣設定已儲存');
}

async function saveRedeem() {
  await api('POST', '/api/redeem', {
    channel_id: document.getElementById('redeem_channel').value.trim(),
    role_id: document.getElementById('redeem_role').value.trim(),
    message_template: document.getElementById('redeem_template').value,
  });
  toast('兌換設定已儲存');
}

async function saveRarity() {
  await api('POST', '/api/rarity', {
    N: document.getElementById('weight_n').value,
    R: document.getElementById('weight_r').value,
    SR: document.getElementById('weight_sr').value,
    SSR: document.getElementById('weight_ssr').value,
  });
  toast('稀有度權重已儲存');
  loadConfig();
}

async function addWork() {
  await api('POST', '/api/work', {
    name: document.getElementById('new_work_name').value,
    duration_hours: document.getElementById('new_work_hours').value,
    energy_cost: document.getElementById('new_work_energy').value,
    token_reward: document.getElementById('new_work_reward').value,
  });
  document.getElementById('new_work_name').value = '';
  document.getElementById('new_work_hours').value = '';
  document.getElementById('new_work_energy').value = '';
  document.getElementById('new_work_reward').value = '';
  toast('打工地點已新增');
  loadConfig();
}

async function deleteWork(name) {
  if (!confirm(`確定刪除「${name}」？`)) return;
  await api('DELETE', '/api/work', { name });
  toast('打工地點已刪除');
  loadConfig();
}

function toggleWeight() {
  document.getElementById('weight-field').style.display =
    document.getElementById('new_prize_rarity').value === '秘藏' ? '' : 'none';
}

async function addPrize() {
  const rarity = document.getElementById('new_prize_rarity').value;
  const body = {
    name: document.getElementById('new_prize_name').value,
    rarity,
  };
  if (rarity === '秘藏') body.weight = document.getElementById('new_prize_weight').value;
  await api('POST', '/api/prize', body);
  document.getElementById('new_prize_name').value = '';
  toast('獎品已新增');
  loadConfig();
}

async function deletePrize(name) {
  if (!confirm(`確定刪除「${name}」？`)) return;
  await api('DELETE', '/api/prize', { name });
  toast('獎品已刪除');
  loadConfig();
}

// --- Activity Mode ---
async function loadActivity() {
  const a = await api('GET', '/api/activity');
  const status = document.getElementById('activity-status');
  const btn = document.getElementById('activity-toggle');
  const card = document.getElementById('activity-card');
  if (a.active) {
    status.innerHTML = `<div style="background:#2d2a00;border:1px solid #f39c12;border-radius:8px;padding:12px;margin-bottom:12px"><strong>🎪 活動進行中：${a.name || '未命名'}</strong><br><span style="font-size:12px;color:#aaa">初始限時代幣：${a.initial_event_tokens} ｜ 結束後所有限時代幣將被清除</span></div>`;
    btn.textContent = '結束活動';
    btn.className = 'btn btn-danger';
    card.style.borderColor = '#f39c12';
  } else {
    status.innerHTML = '';
    btn.textContent = '啟動活動';
    btn.className = 'btn btn-warning';
    card.style.borderColor = '#333560';
  }
  window._activityActive = a.active;
}

async function toggleActivity() {
  if (window._activityActive) {
    if (!confirm('確定結束活動？所有玩家的限時代幣將被清除！')) return;
    await api('POST', '/api/activity', { active: false });
    toast('活動已結束，限時代幣已清除');
  } else {
    const name = document.getElementById('activity_name').value.trim();
    const initial = document.getElementById('activity_initial').value;
    if (!name) { toast('請輸入活動名稱', true); return; }
    await api('POST', '/api/activity', { active: true, name, initial_event_tokens: initial });
    toast(`活動「${name}」已啟動！`);
  }
  loadActivity();
}

// --- Presets ---
async function loadPresets() {
  const presets = await api('GET', '/api/presets');
  const sel = document.getElementById('preset-select');
  sel.innerHTML = '<option value="">-- 選擇組合 --</option>' +
    presets.map(p => `<option value="${p.filename}">${p.name} (${p.saved_at})</option>`).join('');
}

async function savePreset() {
  const name = document.getElementById('preset-name').value.trim();
  if (!name) { toast('請輸入組合名稱', true); return; }
  await api('POST', '/api/presets', { name });
  document.getElementById('preset-name').value = '';
  toast(`已儲存組合「${name}」`);
  loadPresets();
}

async function loadPreset() {
  const sel = document.getElementById('preset-select');
  const filename = sel.value;
  if (!filename) { toast('請先選擇組合', true); return; }
  const name = sel.options[sel.selectedIndex].text;
  if (!confirm(`確定載入組合？目前的設定會被覆蓋。`)) return;
  await api('POST', '/api/presets/load', { filename });
  toast(`已載入組合`);
  loadConfig();
  loadPresets();
}

async function deletePreset() {
  const sel = document.getElementById('preset-select');
  const filename = sel.value;
  if (!filename) { toast('請先選擇組合', true); return; }
  if (!confirm(`確定刪除這個組合？`)) return;
  await api('DELETE', '/api/presets', { filename });
  toast('組合已刪除');
  loadPresets();
}

function toggleBetFields() {
  const ct = document.getElementById('new_adv_cost_type').value;
  document.getElementById('bet-range-fields').style.display = ct === 'custom_tokens' ? 'flex' : 'none';
  document.getElementById('adv-cost-field').style.display = ct === 'custom_tokens' ? 'none' : '';
}

async function addAdventure() {
  const costType = document.getElementById('new_adv_cost_type').value;
  const body = {
    name: document.getElementById('new_adv_name').value,
    cost_type: costType,
    cost_amount: costType === 'custom_tokens' ? '0' : document.getElementById('new_adv_cost').value,
    success_rate: document.getElementById('new_adv_rate').value,
    success_type: document.getElementById('new_adv_sr_type').value,
    success_value: document.getElementById('new_adv_sr_val').value,
    failure_type: document.getElementById('new_adv_fr_type').value,
    failure_value: document.getElementById('new_adv_fr_val').value,
  };
  if (costType === 'custom_tokens') {
    body.min_bet = document.getElementById('new_adv_min_bet').value;
    body.max_bet = document.getElementById('new_adv_max_bet').value;
  }
  await api('POST', '/api/adventure', body);
  document.getElementById('new_adv_name').value = '';
  document.getElementById('new_adv_cost').value = '';
  document.getElementById('new_adv_rate').value = '';
  document.getElementById('new_adv_sr_val').value = '';
  document.getElementById('new_adv_fr_val').value = '';
  toast('冒險事件已新增');
  loadConfig();
}

async function deleteAdventure(name) {
  if (!confirm(`確定刪除冒險「${name}」？`)) return;
  await api('DELETE', '/api/adventure', { name });
  toast('冒險事件已刪除');
  loadConfig();
}

loadConfig();
loadPresets();
loadActivity();
</script>
</body>
</html>
